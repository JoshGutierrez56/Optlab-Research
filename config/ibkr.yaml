connection:
 host: 127.0.0.1
 port: 7497 # 7497 = paper trading, 7496 = live
 client_id: 1
 timeout: 30 # seconds
 readonly: true # never send orders from this connection

snapshot:
 max_expirations: 6 # how many expiration dates to fetch
 max_strikes_atm: 20 # strikes above and below ATM
 fields:
   - BID
   - ASK
   - LAST
   - VOLUME
   - OPEN_INT
   - MODEL_OPTION # includes IV and Greeks
 rate_limit_seconds: 0.5 # pause between contract requests
 retry_attempts: 3
 retry_delay_seconds: 5

storage:
 base_path: data/ibkr_chains
 format: parquet
 partition_by:
   - underlying
   - year
   - month
